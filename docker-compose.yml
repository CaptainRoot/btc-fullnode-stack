version: "3.9"

networks:
  bitcoin:
    name: bitcoin
    enable_ipv6: false

# ---------------------------------------------------------------------
# Define Common environment and logging
x-common-env: &default-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-common-logging: &common-logging-restart-unless-stopped
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-file: ${DOCKERLOGGING_MAXFILE}
      max-size: ${DOCKERLOGGING_MAXSIZE}
# ---------------------------------------------------------------------

services:

# MariaDB - MySQL Database
  mariadb:
    profiles: ["prod", "mempool"]  # FIX: "mempool" ergänzt, da mempool-web/-api darauf warten
    container_name: mariadb
    image: lscr.io/linuxserver/mariadb:latest
    stop_grace_period: 1m
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - mariadb
      bitcoin: {}
    ports:
      - 8306:3306
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      <<: *default-env
      UMASK: "0622"
      MARIADB_ROOT_PASSWORD: "mysql"
      MARIADB_AUTO_UPGRADE: "true"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERCONFDIR}/mariadb:/config:rw

######################################################################################################
# Bitcoin Mining Configuration
# https://bitcoincore.org/en/releases/
  bitcoind:
    profiles: ["bitcoin"]
    container_name: bitcoin-node
    image: bitcoin-core:31.0
    build:
      context: ./bitcoin
      args:
        BITCOIN_VERSION: "31.0"
    stop_grace_period: 1m
    user: "${PUID}:${PGID}"
    <<: *common-logging-restart-unless-stopped
    # FIX: Healthcheck ergänzt – ckpool depends_on wartet jetzt auf echte RPC-Bereitschaft
    healthcheck:
      test: ["CMD", "bitcoin-cli",
             "-rpcuser=${CORE_RPC_USERNAME}",
             "-rpcpassword=${CORE_RPC_PASSWORD}",
             "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      bitcoin:
        aliases:
          - bitcoind
    ports:
      - "8332:8332"   # RPC
      - "8333:8333"   # P2P
      - "28332:28332" # ZMQ hashblock
      - "28333:28333" # ZMQ rawblock
      - "28334:28334" # ZMQ rawtx
    environment:
      <<: *default-env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERSTORAGEDIR}/blocks:/blocks                                        # HDD: Blocks
      - ${DOCKERCONFDIR}/bitcoin/bitcoin-data:/bitcoin                            # NVMe: chainstate, txindex  | FIX: Reihenfolge getauscht
      - ${DOCKERCONFDIR}/bitcoin/bitcoin.conf:/bitcoin/bitcoin.conf               # NVMe: config überschreibt Verzeichnis-Mount

# Bitcoin RPC Explorer
# https://github.com/janoside/btc-rpc-explorer
  bitcoin-explorer:
    profiles: ["bitcoin"]
    container_name: bitcoin-explorer
    image: bitcoin-explorer:1.0
    build:
      context: ./bitcoin-explorer
    depends_on:
      bitcoind:
        condition: service_healthy  # FIX: wartet auf gesunden Node
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - bitcoin-explorer
    ports:
      - "3002:3002"
    environment:
      <<: *default-env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/bitcoin-explorer/bitcoin-explorer.conf:/app/.env:ro

# CKPool Solo
# https://bitbucket.org/ckolivas/ckpool-solo/src/solobtc/
  ckpool:
    profiles: ["bitcoin"]
    container_name: ckpool
    image: ckpool:ckpool-solo
    build:
      context: ./cksolo
    depends_on:
      bitcoind:
        condition: service_healthy  # FIX: wartet auf RPC-Bereitschaft, nicht nur Container-Start
    <<: *common-logging-restart-unless-stopped
    user: "${PUID}:${PGID}"
    networks:
      bitcoin:
        aliases:
          - ckpool
    ports:
      - "3333:3333"   # Stratum (Bitaxe verbindet sich hier)
      - "3334:3334"   # Proxy (optional)
      - "13531:13531" # CKPool interne Stats
    environment:
      <<: *default-env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/cksolo/ckpool.conf:/ckpool-conf/ckpool.conf:ro
      - ${DOCKERCONFDIR}/cksolo/logs:/logs

# PostgreSQL Database for CKStats
# https://www.postgresql.org/
  ckstats-db:
    profiles: ["bitcoin"]
    container_name: ckstats-db
    image: postgres:16-alpine
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - ckstats-db
    ports:
      - "5432:5432"
    environment:
      <<: *default-env
      POSTGRES_USER: ${CKSTATS_DB_USER:-ckstats-mainnet}
      POSTGRES_PASSWORD: ${CKSTATS_DB_PASSWORD:-changeme}
      POSTGRES_DB: ${CKSTATS_DB_NAME:-ckstats-mainnet}
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/ckstats/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CKSTATS_DB_USER:-ckstats-mainnet}"]
      interval: 10s
      timeout: 5s
      retries: 5

# CKStats
# https://github.com/mrv777/ckstats
  ckstats:
    profiles: ["bitcoin"]
    container_name: ckstats
    image: ckstats:1.0
    build:
      context: ./ckstats
    depends_on:
      ckpool:
        condition: service_started
      ckstats-db:
        condition: service_healthy  # FIX: wartet auf gesunde DB
    <<: *common-logging-restart-unless-stopped
    user: "${PUID}:${PGID}"
    networks:
      bitcoin:
        aliases:
          - ckstats
    ports:
      - "4000:3000"   # CKStats Web-Dashboard
    environment:
      <<: *default-env
      REBUILD_APP: "0"
      DB_HOST: "ckstats-db"
      DB_PORT: "5432"
      DB_USER: ${CKSTATS_DB_USER:-ckstats-mainnet}
      DB_PASSWORD: ${CKSTATS_DB_PASSWORD:-changeme}
      DB_NAME: ${CKSTATS_DB_NAME:-ckstats-mainnet}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/cksolo/logs:/logs:ro

# Fulcrum – Electrum Server für Mempool
# https://github.com/cculianu/Fulcrum
  fulcrum:
    profiles: ["mempool"]
    container_name: mempool-fulcrum
    image: fulcrum:1.12.0
    build:
      context: ./fulcrum
      args:
        FULCRUM_VERSION: "1.12.0"
    stop_grace_period: 1m
    depends_on:
      bitcoind:
        condition: service_healthy  # FIX: wartet auf gesunden Node
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - mempool-fulcrum
          - fulcrum
    # Hinweis: Port 50001 nur intern im Docker-Netzwerk erreichbar.
    # Für externen Zugriff (z. B. Wallet) hier freigeben:
    # ports:
    #   - "50001:50001"
    environment:
      <<: *default-env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/fulcrum/data:/fulcrum
      - ${DOCKERCONFDIR}/fulcrum/fulcrum.conf:/config/fulcrum.conf

######################################################################################################
# Mempool Explorer
# https://github.com/mempool/mempool/tree/master/docker
  mempool-web:
    profiles: ["mempool"]
    container_name: mempool-web
    image: mempool/frontend:v3.2.1
    command: "./wait-for mariadb:3306 --timeout=720 -- nginx -g 'daemon off;'"
    stop_grace_period: 1m
    depends_on:
      - mempool-api
      - mariadb  # FIX: explizite Abhängigkeit – mariadb muss mit "mempool"-Profil laufen
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - mempool-web
    ports:
      - "9800:8080"
    environment:
      <<: *default-env
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: "mempool-api"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/mempool/custom-pools:/var/www/mempool/browser/custom-pools:ro

  mempool-api:
    profiles: ["mempool"]
    container_name: mempool-api
    image: mempool/backend:v3.2.1
    command: "./wait-for-it.sh mariadb:3306 --timeout=720 --strict -- ./start.sh"
    stop_grace_period: 1m
    depends_on:
      - mariadb  # FIX: explizite Abhängigkeit
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - mempool-api
    environment:
      <<: *default-env
      MEMPOOL_BACKEND: "electrum"
      ELECTRUM_HOST: "mempool-fulcrum"
      ELECTRUM_PORT: "50001"
      ELECTRUM_TLS_ENABLED: "false"
      CACHE_DIR: "/backend/cache"
      CORE_RPC_HOST: "bitcoind"
      CORE_RPC_PORT: "8332"
      CORE_RPC_USERNAME: "${CORE_RPC_USERNAME}"
      CORE_RPC_PASSWORD: "${CORE_RPC_PASSWORD}"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "mariadb"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      STATISTICS_ENABLED: "true"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/mempool/cache:/backend/cache

######################################################################################################
# Monitoring – InfluxDB + Grafana
  influxdb:
    profiles: ["bitcoin"]
    container_name: influxdb
    image: influxdb:2.7
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - influxdb
    ports:
      - 8086:8086
    environment:
      <<: *default-env
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERCONFDIR}/influxdb:/var/lib/influxdb2

  grafana:
    profiles: ["bitcoin"]
    container_name: grafana
    image: grafana/grafana-oss:latest
    depends_on:
      - influxdb
    <<: *common-logging-restart-unless-stopped
    networks:
      bitcoin:
        aliases:
          - grafana
    ports:
      - 3000:3000
    environment:
      <<: *default-env
      GF_INSTALL_PLUGINS: ""
      GF_SECURITY_ADMIN_USER: ${GRAFANA_INIT_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/TZ:/etc/timezone:ro
      - ${DOCKERCONFDIR}/grafana:/var/lib/grafana
      - ${DOCKERCONFDIR}/grafana/provisioning/:/etc/grafana/provisioning/
